# Server
server.port=${PORT:8080}

# MySQL DataSource — uses env vars in production, defaults for local dev
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/artforge_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:Mahanth@9826}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# dialect auto-detected by Spring Boot 3 / Hibernate 6 — no need to set manually
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:artforge-super-secret-key-2024-min-32-chars!!}
jwt.expiration=86400000

# CORS — exact origins + wildcard pattern for all Vercel preview deployments
# NOTE: do NOT mix a bare "*" with allowCredentials=true — use patterns only
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,https://full-stack-project-2-lilac.vercel.app,https://*.vercel.app}

# Disable HTML error pages — always return JSON
server.error.whitelabel.enabled=false
spring.mvc.problemdetails.enabled=false

# Prevent 301 trailing-slash redirects that turn cross-origin POST into GET (→ 405)
# When browser follows 301 redirect, it converts POST to GET per HTTP spec.
spring.mvc.pathmatch.use-suffix-pattern=false
# Note: spring.web.mvc.pathmatch.* is NOT a valid key — removed

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:dupaguntlarajamahanthprasad@gmail.com}
# ⚠️  Local dev password below — set MAIL_PASSWORD env var on Railway for production
spring.mail.password=${MAIL_PASSWORD:odliiroprqdwpise}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# Logging
logging.level.com.artforge=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
