# Server
server.port=${PORT:8080}

# MySQL DataSource — uses env vars in production, defaults for local dev
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/artforge_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:Mahanth@9826}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:artforge-super-secret-key-2024-min-32-chars!!}
jwt.expiration=86400000

# CORS — includes Vercel production URL and local dev
cors.allowed.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,https://full-stack-project-2-lilac.vercel.app}

# Disable HTML error pages — always return JSON
server.error.whitelabel.enabled=false
spring.mvc.problemdetails.enabled=false

